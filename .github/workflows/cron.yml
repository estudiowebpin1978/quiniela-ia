name: Scheduled draws scraper

on:
  schedule:
    # Ejecutar cada hora para obtener los sorteos disponibles
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha específica (YYYY-MM-DD)'
        required: false

jobs:
  fetch-draws:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then echo "Missing APP_URL secret"; exit 1; fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then echo "Missing CRON_SECRET secret"; exit 1; fi

      - name: Call cron endpoint - Quiniela Nacional
        run: |
          url="${{ secrets.APP_URL }}/api/cron-nacional?secret=${{ secrets.CRON_SECRET }}"
          echo "Calling nacional: $url"
          response=$(curl -s -w "\n%{http_code}" "$url")
          http_code=$(tail -n1 <<< "$response")
          body=$(sed '$d' <<< "$response")
          echo "HTTP status: $http_code"
          echo "$body"
