name: Scheduled draws scraper + predictor ML

on:
  schedule:
    # Cada 15 min en horario de sorteos (8:45 AM - 10:30 PM Argentina = 11:45-01:30 UTC)
    - cron: '*/15 11-23 * * *'
    - cron: '*/15 0-1 * * *'
    # Una vez al dia a las 9:00 AM Argentina (12:00 UTC) para chequeo de vencimientos premium
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha especifica (YYYY-MM-DD)'
        required: false
      history:
        description: 'Scrapear dias historicos (true/false)'
        required: false
        default: 'false'
      days:
        description: 'Cantidad de dias historicos (1-90)'
        required: false
        default: '7'
      skip_scrape:
        description: 'Saltar scrape y solo regenerar predicciones'
        required: false
        default: 'false'
      with_xgboost:
        description: 'Usar XGBoost (si disponible en el entorno)'
        required: false
        default: 'true'

jobs:
  check-premium-expiry:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Check expiring premium subscriptions
        run: |
          url="${{ secrets.APP_URL }}/api/cron-premium-expiry?secret=${{ secrets.CRON_SECRET }}"
          echo "Calling: $url"
          response=$(curl -s -w "\n%{http_code}" "$url")
          http_code=$(tail -n1 <<< "$response")
          body=$(sed '$d' <<< "$response")
          echo "HTTP status: $http_code"
          echo "$body"

  fetch-draws:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then echo "Missing APP_URL secret"; exit 1; fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then echo "Missing CRON_SECRET secret"; exit 1; fi

      - name: Scrape today + backfill last 3 days
        if: inputs.skip_scrape != 'true'
        run: |
          url="${{ secrets.APP_URL }}/api/cron-nacional?secret=${{ secrets.CRON_SECRET }}&save=true"
          echo "Calling: $url"
          response=$(curl -s -w "\n%{http_code}" "$url")
          http_code=$(tail -n1 <<< "$response")
          body=$(sed '$d' <<< "$response")
          echo "HTTP status: $http_code"
          echo "$body"
          if [ "$http_code" -ne 200 ]; then echo "ERROR: Scrape API returned $http_code"; exit 1; fi
          echo "SCRAPE_DONE=true" >> $GITHUB_ENV

      - name: Historical backfill (if triggered with history=true)
        if: inputs.history == 'true'
        run: |
          days="${{ inputs.days || '7' }}"
          url="${{ secrets.APP_URL }}/api/cron?secret=${{ secrets.CRON_SECRET }}&history=true&days=$days&force=true"
          echo "Calling history: $url"
          response=$(curl -s -w "\n%{http_code}" "$url")
          http_code=$(tail -n1 <<< "$response")
          body=$(sed '$d' <<< "$response")
          echo "HTTP status: $http_code"
          echo "$body"
          if [ "$http_code" -ne 200 ]; then echo "ERROR: History API returned $http_code"; exit 1; fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Regenerate predictions with quiniela_ml
        run: |
          python quiniela_ml/run_all.py

      - name: Train LightGBM + XGBoost ensemble
        run: |
          python lib/ml/python/train_lightgbm_xgboost.py

      - name: Check if predictions changed
        id: check_changes
        run: |
          git add modelos_exportados/
          if git diff --cached --quiet; then
            echo "No changes in prediction files"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "Predictions changed"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Commit and push updated predictions
        if: env.HAS_CHANGES == 'true'
        run: |
          git config user.name "quiniela-ml-bot"
          git config user.email "bot@quiniela-ia.app"
          git commit -m "auto: regenerate predictions [skip ci]"
          git push
