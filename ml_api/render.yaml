services:
  - type: web
    name: quiniela-ml-api
    env: python
    buildCommand: pip install -r ml_api/requirements.txt
    startCommand: cd ml_api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://wazkylxgqckjfkcmfotl.supabase.co
